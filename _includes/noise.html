<div class="overlay noise"></div>
<style>
/* ── Full-site film-grain noise overlay ──────────────────────────────
   `.overlay` is the hidden base; `.overlay.noise` (in _includes/noise.html,
   dropped into every layout's <body>) is the active film-grain layer. It's
   oversized + offset so the `grain` jitter never exposes an edge, sits above
   page content (z-index 800) and lets clicks pass through (pointer-events). */
.overlay {
    top: 0;
    left: 0;
    position: fixed;
    pointer-events: none;
    display: none;
}

.overlay.noise {
    display: block;
    z-index: 800;
    animation: grain 8s steps(10) infinite;
    background-image: url(/assets/img/noise.png);
    height: 400%;
    left: -50%;
    top: -150%;
    width: 300%;
    background-size: auto;
    opacity: 0.2;
}

@keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10%  { transform: translate(-5%, -10%); }
    20%  { transform: translate(-15%, 5%); }
    30%  { transform: translate(7%, -25%); }
    40%  { transform: translate(-5%, 25%); }
    50%  { transform: translate(-15%, 10%); }
    60%  { transform: translate(15%, 0%); }
    70%  { transform: translate(0%, 15%); }
    80%  { transform: translate(3%, 35%); }
    90%  { transform: translate(-10%, 10%); }
}
</style>
