services:
  site:
    image: ruby:3.1
    working_dir: /site
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/site
      # Keep installed gems outside the project tree.
      # This makes repeated `docker compose up` runs faster.
      - bundle_cache:/usr/local/bundle
    environment:
      BUNDLE_PATH: /usr/local/bundle
      BUNDLE_APP_CONFIG: /usr/local/bundle/config
    command: >
      sh -c "bundle install &&
      bundle exec jekyll serve
      --host 0.0.0.0
      --port 4000
      --livereload
      --force_polling"

volumes:
  bundle_cache:
